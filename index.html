<!DOCTYPE html>
<html>
<head>
    <title>Tech Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Tech Store</h1>
    <button onclick="window.location.href='login.html'">Login</button>
    <input type="text" id="search" placeholder="Search Product">
<button onclick="searchProduct()">Search</button>
    <h3>Cart Items: <span id="cart-count">0</span></h3>

    <div class="product">
        <h2>Laptop</h2>
        <p>Price: ₹50,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <h2>Mobile</h2>
        <p>Price: ₹20,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>
    <div class="product">
    <h2>Headphones</h2>
    <p>Price: ₹2,000</p>
    <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
    <h2>Smart Watch</h2>
    <p>Price: ₹3,000</p>
    <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
    <h2>Camera</h2>
    <p>Price: ₹25,000</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
    <h2>Speaker</h2>
    <p>Price: ₹1,500</p>
    <button onclick="addToCart()">Add to Cart</button>
</div>
<button onclick="checkout()">Proceed to Checkout</button>

    <script src="script.js"></script>

</body>
</html>
